<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anemate — Minimal SVG Tool</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h1>Anemate</h1>
        <p class="subtitle">minimal svg + motion</p>

        <div class="tabs">
          <button class="tab is-active" data-tab="draw">Draw</button>
          <button class="tab" data-tab="animate">Animate</button>
          <button class="tab" data-tab="export">Export</button>
        </div>

        <section class="panel is-active" data-panel="draw">
          <label>Tool</label>
          <div class="tool-row">
            <button class="tool is-active" data-tool="select">Select</button>
            <button class="tool" data-tool="pan">Pan</button>
            <button class="tool" data-tool="rect">Rect</button>
            <button class="tool" data-tool="circle">Circle</button>
            <button class="tool" data-tool="path">Path</button>
          </div>

          <label>Fill</label>
          <input id="fillColor" type="color" value="#8b8b8b" />

          <label>Stroke</label>
          <input id="strokeColor" type="color" value="#1e1e1e" />

          <label>Stroke width</label>
          <input id="strokeWidth" type="range" min="1" max="12" value="2" />

          <label class="inline-row">
            <input id="snapToggle" type="checkbox" /> Snap to grid
          </label>
          <label>Grid size</label>
          <input id="gridSize" type="number" min="4" max="100" value="24" />

          <label>Extrude depth</label>
          <input id="extrudeDepth" type="range" min="0" max="20" value="6" />
          <button id="extrudeBtn">Extrude selected</button>

          <div class="button-row">
            <button id="duplicateBtn">Duplicate</button>
            <button id="deleteBtn">Delete</button>
          </div>
          <div class="button-row">
            <button id="frontBtn">Bring front</button>
            <button id="backBtn">Send back</button>
          </div>

          <div class="button-row">
            <button id="undoBtn">Undo</button>
            <button id="redoBtn">Redo</button>
          </div>
        </section>

        <section class="panel" data-panel="animate">
          <label>Animation template</label>
          <select id="animTemplate">
            <option value="custom">Custom</option>
            <option value="slideRight">Slide right</option>
            <option value="pulse">Pulse</option>
            <option value="spin">Spin</option>
            <option value="fade">Fade in/out</option>
            <option value="bounce">Bounce</option>
          </select>
          <button id="applyTemplateBtn">Apply template</button>

          <label>Animation type</label>
          <select id="animType">
            <option value="translate">Translate</option>
            <option value="rotate">Rotate</option>
            <option value="scale">Scale</option>
            <option value="opacity">Opacity</option>
          </select>

          <label>From</label>
          <input id="animFrom" type="text" value="0 0" />

          <label>To</label>
          <input id="animTo" type="text" value="80 0" />

          <label>Duration (s)</label>
          <input id="animDur" type="number" min="0.1" step="0.1" value="2" />

          <div class="button-row">
            <button id="addAnimBtn">Add animation</button>
            <button id="clearAnimBtn">Clear anims</button>
          </div>
          <div class="button-row triple">
            <button id="playBtn">Play</button>
            <button id="pauseBtn">Pause</button>
            <button id="stopBtn">Stop</button>
          </div>

          <ul id="animList"></ul>
        </section>

        <section class="panel" data-panel="export">
          <label>Import SVG</label>
          <input id="importSvg" type="file" accept=".svg,image/svg+xml" />

          <div class="button-row">
            <button id="zoomInBtn">Zoom +</button>
            <button id="zoomOutBtn">Zoom −</button>
            <button id="resetViewBtn">Reset view</button>
          </div>

          <button id="clearBtn">Clear canvas</button>
          <button id="exportBtn">Export SVG</button>
          <p class="hint">Pan with Pan tool or hold Space + drag. Wheel to zoom.</p>
        </section>
      </aside>

      <main class="stage-wrap">
        <div class="toolbar">
          <span id="status">Tool: select</span>
        </div>
        <svg id="stage" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg"></svg>
      </main>
    </div>

    <script src="assets/app.js"></script>
  </body>
</html>
