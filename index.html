<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anemate — Minimal SVG Tool</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="panel left-panel">
        <h1>Anemate</h1>
        <p class="subtitle">minimal svg tool</p>

        <div class="section">
          <label>Tool</label>
          <div class="tool-row">
            <button class="btn active" data-tool="select">Select</button>
            <button class="btn" data-tool="rect">Rect</button>
            <button class="btn" data-tool="ellipse">Ellipse</button>
            <button class="btn" data-tool="line">Line</button>
            <button class="btn" data-tool="path">Draw</button>
          </div>
        </div>

        <div class="section">
          <label>Styles</label>
          <div class="stack">
            <label class="inline">Fill <input id="fill" type="color" value="#7a7a7a" /></label>
            <label class="inline">Stroke <input id="stroke" type="color" value="#d0d0d0" /></label>
            <label class="inline">Width <input id="strokeWidth" type="range" min="1" max="10" value="2" /></label>
          </div>
        </div>

        <div class="section">
          <label>Transform</label>
          <div class="stack">
            <label class="inline">X <input id="posX" type="number" value="120" /></label>
            <label class="inline">Y <input id="posY" type="number" value="120" /></label>
          </div>
        </div>
      </aside>

      <main class="workspace">
        <header class="tabs">
          <button class="tab active" data-tab="draw">Draw</button>
          <button class="tab" data-tab="animations">Animations</button>
          <button class="tab" data-tab="export">Export</button>
        </header>

        <section id="draw" class="tab-panel active">
          <div class="canvas-wrap">
            <svg id="canvas" viewBox="0 0 1200 700"></svg>
          </div>
        </section>

        <section id="animations" class="tab-panel">
          <div class="control-grid">
            <label>Target Layer
              <select id="animTarget"></select>
            </label>
            <label>Property
              <select id="animProperty">
                <option value="x">X</option>
                <option value="y">Y</option>
                <option value="opacity">Opacity</option>
                <option value="rotate">Rotate</option>
              </select>
            </label>
            <label>From <input id="animFrom" type="number" value="0" /></label>
            <label>To <input id="animTo" type="number" value="160" /></label>
            <label>Duration (s) <input id="animDuration" type="number" value="2" step="0.1" /></label>
            <label>Loop
              <select id="animLoop">
                <option value="1">No</option>
                <option value="indefinite">Yes</option>
              </select>
            </label>
          </div>
          <div class="row">
            <button id="addAnimation" class="btn">Add Animation</button>
            <button id="playAnimations" class="btn">Preview</button>
            <button id="clearAnimations" class="btn danger">Clear All</button>
          </div>
          <ul id="animationList" class="list"></ul>
        </section>

        <section id="export" class="tab-panel">
          <div class="control-grid">
            <label>Extrude Depth <input id="extrudeDepth" type="number" value="10" min="1" max="60" /></label>
            <label>Offset X <input id="extrudeX" type="number" value="6" /></label>
            <label>Offset Y <input id="extrudeY" type="number" value="6" /></label>
          </div>
          <div class="row">
            <button id="extrudeSelected" class="btn">Extrude Selected</button>
            <button id="exportSvg" class="btn">Export SVG</button>
          </div>
          <textarea id="exportOutput" readonly placeholder="Exported SVG will show here..."></textarea>
        </section>
      </main>

      <aside class="panel right-panel">
        <h2>Layers</h2>
        <ul id="layers" class="list"></ul>
      </aside>
    </div>

    <script src="assets/app.js"></script>
  </body>
</html>
