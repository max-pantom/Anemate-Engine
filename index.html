<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anemate SVG Tool</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="panel left-panel">
        <h1>Anemate</h1>
        <p class="muted">Minimal SVG Studio</p>

        <div class="control-group">
          <label>Tool</label>
          <div class="tool-grid" id="tool-grid">
            <button data-tool="select" class="active">Select</button>
            <button data-tool="rect">Rect</button>
            <button data-tool="circle">Circle</button>
            <button data-tool="line">Line</button>
            <button data-tool="pen">Pen</button>
          </div>
        </div>

        <div class="control-group">
          <label for="stroke">Stroke</label>
          <input type="color" id="stroke" value="#d4d4d8" />
          <label for="fill">Fill</label>
          <input type="color" id="fill" value="#3f3f46" />
          <label for="stroke-width">Stroke Width</label>
          <input type="range" id="stroke-width" min="1" max="12" value="2" />
        </div>

        <div class="control-group">
          <label>Object</label>
          <button id="extrude-btn">Extrude +8px</button>
          <button id="delete-btn">Delete</button>
          <button id="clear-btn">Clear All</button>
        </div>

        <div class="control-group">
          <label>Export</label>
          <button id="export-btn">Export SVG</button>
        </div>
      </aside>

      <main class="workspace">
        <header class="tabs" id="tabs">
          <button data-tab="draw" class="active">Draw</button>
          <button data-tab="animation">Animation</button>
        </header>

        <section id="draw-tab" class="tab active">
          <div class="canvas-wrap">
            <svg id="canvas" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>
        </section>

        <section id="animation-tab" class="tab">
          <div class="timeline-head">
            <h2>Animations</h2>
            <p class="muted">Add keyframes for selected shape and preview.</p>
          </div>

          <div class="anim-controls">
            <label>Time (s)<input type="number" id="kf-time" min="0" max="20" step="0.1" value="0" /></label>
            <label>X<input type="number" id="kf-x" step="1" value="0" /></label>
            <label>Y<input type="number" id="kf-y" step="1" value="0" /></label>
            <label>Scale<input type="number" id="kf-scale" step="0.1" value="1" /></label>
            <label>Rotate<input type="number" id="kf-rotate" step="1" value="0" /></label>
            <label>Opacity<input type="number" id="kf-opacity" step="0.05" min="0" max="1" value="1" /></label>
            <button id="add-keyframe-btn">Add Keyframe</button>
            <button id="play-btn">Play</button>
            <button id="stop-btn">Stop</button>
          </div>

          <div class="timeline-list" id="timeline-list"></div>
        </section>
      </main>

      <aside class="panel right-panel">
        <h2>Layers</h2>
        <ul id="layers"></ul>
      </aside>
    </div>

    <script src="assets/app.js"></script>
  </body>
</html>
